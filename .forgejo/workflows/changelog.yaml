name: Generate CHANGELOG.md
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate a changelog
        uses: https://github.com/orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --verbose
          github_token: ${{ secrets.GITHUB }}
        env:
          OUTPUT: CHANGELOG.md
      - name: Commit
        run: |
          git config user.name 'Forgejo Action'
          git config user.email 'action@forgejo.local'
          set +e
          git add CHANGELOG.md
          git commit -m "ci(chore): update changelog"
          git push
